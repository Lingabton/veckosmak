          "@type": "Question",
          "name": "Hur fungerar Veckosmak?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Veckosmak hämtar veckans erbjudanden från din ICA Maxi-butik, matchar dem mot 600+ recept med crowd-betyg och skapar en personlig veckomeny som sparar dig pengar. Du får både recept med näringsvärden och en färdig inköpslista sorterad efter butikens layout."

        {
          "@type": "Question",
          "name": "Är Veckosmak gratis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, Veckosmak är helt gratis att använda. Skapa din veckomeny, få recept och inköpslista utan kostnad."
          }
        },
        {
          "@type": "Question",
          "name": "Vilka butiker stöds?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Veckosmak stödjer 96 ICA Maxi-butiker i hela Sverige, från Haparanda i norr till Trelleborg i söder. Välj din butik och få lokala erbjudanden. Fler butikskedjor som Willys och Coop planeras."
          }
        },
        {
          "@type": "Question",
          "name": "Kan jag välja vegetariskt eller glutenfritt?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, du kan välja mellan vegetariskt, veganskt, glutenfritt, mjölkfritt, laktosfritt och fläskfritt. Du kan också ange ingredienser du vill undvika och välja livsstilspreferenser som proteinrikt, lågkolhydrat eller klimatsmart."
          }
        },
        {
          "@type": "Question",
          "name": "Hur mycket kan jag spara?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Typiskt sparar användare 200-400 kr per vecka genom att välja recept som matchar butikens erbjudanden. Besparingen beror på vilka erbjudanden som finns och hur stor familjen är."
          }
        }
      ]
    }
