<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veckosmak OG Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #111;
    }
    .card {
      width: 1200px;
      height: 630px;
      background: linear-gradient(160deg, #145a2e 0%, #0f3d22 40%, #0a2a17 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      border-radius: 50%;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
      border-radius: 50%;
    }
    .logo {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 88px;
      color: #ffffff;
      letter-spacing: -1px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    .tagline {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 32px;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }
    .stats {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 22px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
      position: relative;
      z-index: 1;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">veckosmak</div>
    <div class="tagline">Från erbjudande till riktig middag</div>
    <div class="divider"></div>
    <div class="stats">1 300+ butiker &middot; 1 350+ recept &middot; Gratis</div>
  </div>
</body>
</html>
